model_type: mamba

data:
  processed_npz: data/processed/perturbation_delta_dataset.npz
  split_json: data/splits/gene_split_seed42.json

training:
  seed: 42
  epochs: 30
  batch_size: 16
  lr: 0.001
  weight_decay: 0.0001
  patience: 30
  # Checkpoint/early-stop metric. Higher-is-better: pds_norm (default),
  # des_score_norm, delta_cosine. Lower-is-better: delta_mae, pseudobulk_mae.
  # des_score_norm requires a dataset preprocessed with DE sets.
  selection_metric: pds_norm
  checkpoint_path: outputs/checkpoints/mamba_best.pt
  metrics_path: outputs/metrics/mamba_metrics.json

wandb:
  enabled: true
  project: virtual-perturbation-evaluator
  run_name: mamba

model:
  hidden_size: 256
  num_layers: 6
  state_size: 32
  dropout: 0.1
  bidirectional: true
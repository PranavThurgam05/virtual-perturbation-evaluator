model_type: mlp

data:
  processed_npz: data/processed/perturbation_delta_dataset.npz
  split_json: data/splits/gene_split_seed42.json

training:
  seed: 42
  epochs: 300
  batch_size: 16
  lr: 0.001
  weight_decay: 0.0001
  patience: 30
  checkpoint_path: outputs/checkpoints/mlp_best.pt
  metrics_path: outputs/metrics/mlp_metrics.json

wandb:
  enabled: true
  project: virtual-perturbation-evaluator
  run_name: mlp

model:
  feature_dim: 128
  hidden_dim: 512
  dropout: 0.15
